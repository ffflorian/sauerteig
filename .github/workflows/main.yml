name: Main

permissions: {}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint_typescript:
    name: Lint and build TypeScript
    permissions:
      contents: read
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 26
          cache: yarn

      - name: Install dependencies
        run: yarn --immutable

      - name: Lint and build
        run: |
          yarn lint
          yarn build

  test_nginx_config:
    name: Test nginx config
    permissions:
      contents: read
    runs-on: ubuntu-latest
    container:
      image: nginx:1.31.0-alpine@sha256:c22e76a97fe5bacad9d58bad0a96e903480c05f8dee30884b14550530ddd25a9
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Generate and validate nginx config
        run: |
          cp packages/frontend/nginx.conf /etc/nginx/conf.d/default.conf
          nginx -t

  lint_dockerfile:
    name: Lint Dockerfiles
    permissions:
      contents: read
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5
        with:
          dockerfile: frontend.Dockerfile

      - name: Lint backend Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5
        with:
          dockerfile: backend.Dockerfile

  publish:
    name: Publish Release and Docker images
    needs:
      - test_nginx_config
      - lint_dockerfile
      - lint_typescript
    permissions:
      contents: write
      packages: write
      issues: write
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.publish_release.outputs.new_release_published }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Publish Release and Docker images
        id: publish_release
        uses: ffflorian/actions/docker-image-release@b479e690751ea7150a7efa6f48afb0b735800d46
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          dockerfiles: |
            frontend:frontend.Dockerfile
            backend:backend.Dockerfile
          git_author: 'ffflorian'
          git_email: 'git@ffflorian.de'

  # Deploy is part of this workflow because GitHub does not fire release events
  # when a release is created by a workflow using GITHUB_TOKEN, so a separate
  # deploy.yml listening on release:published would never be triggered.
  deploy:
    name: Deploy latest images
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    if: |
      always() && (
        github.event_name == 'workflow_dispatch' ||
        (needs.publish.result == 'success' && needs.publish.outputs.new_release_published == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main')
      )
    steps:
      - name: Deploy
        uses: ffflorian/actions/coolify-deploy@b479e690751ea7150a7efa6f48afb0b735800d46
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          domain: ${{ secrets.COOLIFY_DOMAIN }}
          token: ${{ secrets.COOLIFY_TOKEN }}
          uuid: ${{ secrets.COOLIFY_FRONTEND_UUID }},${{ secrets.COOLIFY_BACKEND_UUID }}
