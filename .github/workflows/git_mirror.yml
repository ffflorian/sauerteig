name: Mirror to Codeberg and GitLab

permissions: {}

on:
  push:
    branches: [main]

jobs:
  mirror:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: ffflorian/actions/git-mirror@347c23df6262a6482a59a1558f17f4f0b69249b1
        with:
          GITLAB_REMOTE: 'git@gitlab.com:ffflorian/sauerteig.git'
          GITLAB_SECRET: ${{ secrets.GITLAB_SECRET }}
          GITLAB_PUSH_ALL_REFS: 'false'
          CODEBERG_REMOTE: 'git@codeberg.org:ffflorian/sauerteig.git'
          CODEBERG_SECRET: ${{ secrets.CODEBERG_SECRET }}
          CODEBERG_PUSH_ALL_REFS: 'false'
